<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Asie Quiz</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--bg:#0d1117;--surface:#161b22;--card:#1c2333;--gold:#d4a843;--gold2:#f0c96a;--green:#22c55e;--red:#ef4444;--text:#e6edf3;--muted:#7d8590;--border:#30363d}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:Georgia,serif}
#app{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;background:var(--bg)}
.header{padding-top:calc(12px + env(safe-area-inset-top));padding-bottom:9px;padding-left:16px;padding-right:16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:4px}
.hdr-title{font-size:15px;color:var(--gold);font-weight:bold}
.hdr-sub{font-size:10px;color:var(--muted);margin-top:2px}
.score-wrap{display:flex;gap:6px;flex:1;justify-content:center}
.sbox{text-align:center}
.snum{font-size:12px;font-weight:bold;line-height:1}
.slbl{font-size:8px;color:var(--muted);margin-top:1px}
.hdr-btns{display:flex;gap:5px;align-items:center}
.hdr-btn{font-size:10px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:10px;padding:4px 7px;cursor:pointer;font-family:Georgia,serif}
.lang-btn{font-size:16px;background:none;border:none;cursor:pointer;padding:2px}
.phase-bar{display:flex;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.ps{flex:1;padding:7px 4px;text-align:center;font-size:10px;color:var(--muted);border:none;border-bottom:2px solid transparent;line-height:1.4;background:none;cursor:pointer;font-family:Georgia,serif}
.ps.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:bold}
.prog-wrap{height:3px;background:var(--border);flex-shrink:0}
.prog-fill{height:100%;background:var(--gold);transition:width .4s}
.q-banner{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;flex-shrink:0;min-height:48px;display:flex;align-items:center;justify-content:center}
.q-text{font-size:14px;color:var(--text);text-align:center;line-height:1.5}
.q-hl{color:var(--gold2);font-weight:bold}
.q-ctx{font-size:11px;color:var(--muted);display:block;margin-top:2px}
.map-wrap{flex:1;position:relative;overflow:hidden}
#map{width:100%;height:100%}
.leaflet-container{background:#e8e4dc!important}
.leaflet-interactive{pointer-events:auto!important}
.leaflet-overlay-pane svg path{pointer-events:visiblePainted!important}
.leaflet-control-zoom{display:none}
.leaflet-control-attribution{font-size:8px;opacity:.2;background:rgba(0,0,0,.6)!important;color:#888!important}
.fb-bar{background:var(--surface);border-top:1px solid var(--border);padding:11px 14px;padding-bottom:calc(11px + env(safe-area-inset-bottom));flex-shrink:0;text-align:center;font-size:12px;color:var(--muted);min-height:52px;display:flex;align-items:center;justify-content:center;line-height:1.5}
.fb-bar.ok{color:var(--green)}.fb-bar.ko{color:var(--red)}.fb-bar.hint{color:var(--gold)}
.pm{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;border:2px solid rgba(255,255,255,.4);box-shadow:0 2px 8px rgba(0,0,0,.5)}
.pm.idle{background:rgba(30,30,30,.7)}.pm.done{background:rgba(80,80,80,.5)}.pm.ok{background:rgba(34,197,94,.9);border-color:#86efac}.pm.ko{background:rgba(239,68,68,.9);border-color:#fca5a5}
.load-ov{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:4000;gap:14px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-size:13px;color:var(--muted)}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div><div class="hdr-title">🌎 Asie Quiz</div><div class="hdr-sub" id="hdr-sub">Pays</div></div>
    <div class="score-wrap">
      <div class="sbox"><div class="snum" id="sc1" style="color:var(--green)">0✓ 0✗</div><div class="slbl" id="lb1">Pays</div></div>
      <div class="sbox"><div class="snum" id="sc2" style="color:var(--gold2)">0✓ 0✗</div><div class="slbl" id="lb2">Capitales</div></div>
      <div class="sbox"><div class="snum" id="sc3" style="color:#4d908e">0✓ 0✗</div><div class="slbl" id="lb3">Drapeaux</div></div>
    </div>
    <div class="hdr-btns">
      <button class="hdr-btn" onclick="raz()">RAZ</button>
      <button class="lang-btn" id="lang-btn" onclick="toggleLang()">🇫🇷</button>
      <button class="lang-btn" onclick="showSettings()">📱</button>
    </div>
  </div>
  <div class="phase-bar">
    <button class="ps active" id="ps1" onclick="jumpToPhase(1)">🗺<br><span id="ps1l">Pays</span></button>
    <button class="ps" id="ps2" onclick="jumpToPhase(2)">🏛<br><span id="ps2l">Capitales</span></button>
    <button class="ps" id="ps3" onclick="jumpToPhase(3)">🏴<br><span id="ps3l">Drapeaux</span></button>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  <div class="q-banner"><div class="q-text" id="q-text">Chargement…</div></div>
  <div class="map-wrap">
    <div id="map"></div>
    <div class="load-ov" id="load-ov"><div class="spinner"></div><div class="load-txt">Chargement…</div></div>
  </div>
  <div class="fb-bar hint" id="fb-bar">Tapez sur la bonne zone</div>
</div>
<script>
// ===== DONNÉES 27 PAYS UE =====
const PAYS = [
  {code:"AF", fr:"Afghanistan",    en:"Afghanistan",     cap_fr:"Kaboul",              cap_en:"Kabul",               flag:"🇦🇫", lat:33.94, lng:67.71},
  {code:"AM", fr:"Armenie",        en:"Armenia",         cap_fr:"Erevan",              cap_en:"Yerevan",             flag:"🇦🇲", lat:40.07, lng:45.04},
  {code:"AZ", fr:"Azerbaidjan",    en:"Azerbaijan",      cap_fr:"Bakou",               cap_en:"Baku",                flag:"🇦🇿", lat:40.14, lng:47.58},
  {code:"BD", fr:"Bangladesh",     en:"Bangladesh",      cap_fr:"Dacca",               cap_en:"Dhaka",               flag:"🇧🇩", lat:23.68, lng:90.36},

  {code:"KH", fr:"Cambodge",       en:"Cambodia",        cap_fr:"Phnom Penh",          cap_en:"Phnom Penh",          flag:"🇰🇭", lat:12.57, lng:104.99},
  {code:"CN", fr:"Chine",          en:"China",           cap_fr:"Pekin",               cap_en:"Beijing",             flag:"🇨🇳", lat:35.86, lng:104.20},

  {code:"ID", fr:"Indonesie",      en:"Indonesia",       cap_fr:"Jakarta",             cap_en:"Jakarta",             flag:"🇮🇩", lat:-2.49, lng:117.89},
  {code:"JP", fr:"Japon",          en:"Japan",           cap_fr:"Tokyo",               cap_en:"Tokyo",               flag:"🇯🇵", lat:36.20, lng:138.25},
  {code:"KZ", fr:"Kazakhstan",     en:"Kazakhstan",      cap_fr:"Astana",              cap_en:"Astana",              flag:"🇰🇿", lat:48.02, lng:66.92},
  {code:"KG", fr:"Kirghizistan",   en:"Kyrgyzstan",      cap_fr:"Bichkek",             cap_en:"Bishkek",             flag:"🇰🇬", lat:41.20, lng:74.77},
  {code:"LA", fr:"Laos",           en:"Laos",            cap_fr:"Vientiane",           cap_en:"Vientiane",           flag:"🇱🇦", lat:17.97, lng:102.60},
  {code:"MY", fr:"Malaisie",       en:"Malaysia",        cap_fr:"Kuala Lumpur",        cap_en:"Kuala Lumpur",        flag:"🇲🇾", lat:4.21,  lng:108.96},
  {code:"MV", fr:"Maldives",       en:"Maldives",        cap_fr:"Male",                cap_en:"Male",                flag:"🇲🇻", lat:3.20,  lng:73.22},
  {code:"MN", fr:"Mongolie",       en:"Mongolia",        cap_fr:"Oulan-Bator",         cap_en:"Ulaanbaatar",         flag:"🇲🇳", lat:46.86, lng:103.85},
  {code:"MM", fr:"Myanmar",        en:"Myanmar",         cap_fr:"Naypyidaw",           cap_en:"Naypyidaw",           flag:"🇲🇲", lat:19.15, lng:96.13},
  {code:"NP", fr:"Nepal",          en:"Nepal",           cap_fr:"Katmandou",           cap_en:"Kathmandu",           flag:"🇳🇵", lat:28.39, lng:84.12},
  {code:"UZ", fr:"Ouzbekistan",    en:"Uzbekistan",      cap_fr:"Tachkent",            cap_en:"Tashkent",            flag:"🇺🇿", lat:41.38, lng:64.59},
  {code:"PK", fr:"Pakistan",       en:"Pakistan",        cap_fr:"Islamabad",           cap_en:"Islamabad",           flag:"🇵🇰", lat:30.38, lng:69.35},
  {code:"PH", fr:"Philippines",    en:"Philippines",     cap_fr:"Manille",             cap_en:"Manila",              flag:"🇵🇭", lat:12.88, lng:121.77},
  {code:"SG", fr:"Singapour",      en:"Singapore",       cap_fr:"Singapour",           cap_en:"Singapore",           flag:"🇸🇬", lat:1.35,  lng:103.82},
  {code:"LK", fr:"Sri Lanka",      en:"Sri Lanka",       cap_fr:"Colombo",             cap_en:"Colombo",             flag:"🇱🇰", lat:7.87,  lng:80.77},
  {code:"TJ", fr:"Tadjikistan",    en:"Tajikistan",      cap_fr:"Douchanbé",           cap_en:"Dushanbe",            flag:"🇹🇯", lat:38.86, lng:71.28},
  {code:"TW", fr:"Taiwan",         en:"Taiwan",          cap_fr:"Taipei",              cap_en:"Taipei",              flag:"🇹🇼", lat:23.70, lng:120.96},
  {code:"TH", fr:"Thailande",      en:"Thailand",        cap_fr:"Bangkok",             cap_en:"Bangkok",             flag:"🇹🇭", lat:15.87, lng:100.99},
  {code:"TL", fr:"Timor oriental", en:"East Timor",      cap_fr:"Dili",                cap_en:"Dili",                flag:"🇹🇱", lat:-8.87, lng:125.73},
  {code:"TM", fr:"Turkmenistan",   en:"Turkmenistan",    cap_fr:"Achgabat",            cap_en:"Ashgabat",            flag:"🇹🇲", lat:38.97, lng:59.56},
  {code:"VN", fr:"Vietnam",        en:"Vietnam",         cap_fr:"Hanoi",               cap_en:"Hanoi",               flag:"🇻🇳", lat:14.06, lng:108.28},
];

// Couleurs par pays
const COLORS = {
  AF:"#e63946",AM:"#457b9d",AZ:"#f4a261",BD:"#2a9d8f",BT:"#e9c46a",
  BN:"#9b5de5",KH:"#ff595e",CN:"#8ac926",KP:"#4d908e",KR:"#1982c4",
  GE:"#d4a017",IN:"#6bcb77",ID:"#e76f51",JP:"#e63946",KZ:"#457b9d",
  KG:"#f4a261",LA:"#2a9d8f",MY:"#e9c46a",MV:"#9b5de5",MN:"#ff595e",
  MM:"#8ac926",NP:"#4d908e",UZ:"#1982c4",PK:"#d4a017",PH:"#6bcb77",
  SG:"#e76f51",LK:"#e63946",TJ:"#457b9d",TW:"#f4a261",TH:"#2a9d8f",
  TL:"#e9c46a",TM:"#9b5de5",VN:"#ff595e",
};

// ===== STATE =====
let map, geoData, gLayer=null, markers=[];
let phase=1, cur=null, answered=false, lang='fr';
let scores={1:{ok:0,ko:0},2:{ok:0,ko:0},3:{ok:0,ko:0}};
let used=[], found=new Set(), errors=new Set();
let reviewMode=false, reviewPool=[];
let _touchSX=0, _touchSY=0, _geoClickFn=null;

const T = {
  pays:     {fr:'Pays',       en:'Countries'},
  capitales:{fr:'Capitales',  en:'Capitals'},
  drapeaux: {fr:'Drapeaux',   en:'Flags'},
  tapPays:  {fr:'Tapez sur le bon pays',      en:'Tap the right country'},
  tapCap:   {fr:'Tapez sur la bonne capitale',en:'Tap the right capital'},
  tapFlag:  {fr:'Tapez sur le bon drapeau',   en:'Tap the right flag'},
  ouPays:   {fr:'Où se trouve',               en:'Where is'},
  ouCap:    {fr:'Où se trouve la capitale',   en:'Where is the capital'},
  ouFlag:   {fr:'Quel est le drapeau de',     en:'What is the flag of'},
};
const t=k=>T[k][lang];
const pInfo=code=>PAYS.find(p=>p.code===code);
const pName=p=>p[lang==='fr'?'fr':'en'];
const pCap=p=>p[lang==='fr'?'cap_fr':'cap_en'];

// ===== INIT =====
async function init(){
  map=L.map('map',{zoomControl:false,dragging:true,scrollWheelZoom:false,doubleClickZoom:false,touchZoom:true,tap:true,tapTolerance:15});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:13}).addTo(map);
  map.setView([35,90],3);
  initTouch();
  // Mapping nom GeoJSON -> code ISO (fonctionne avec johan/world.geo.json)
  const NAME2CODE={
    "Afghanistan":"AF","Armenia":"AM","Azerbaijan":"AZ","Bangladesh":"BD",
    "Bhutan":"BT","Brunei":"BN","Cambodia":"KH","China":"CN",
    "North Korea":"KP","South Korea":"KR","Georgia":"GE","India":"IN",
    "Indonesia":"ID","Japan":"JP","Kazakhstan":"KZ","Kyrgyzstan":"KG",
    "Laos":"LA","Malaysia":"MY","Maldives":"MV","Mongolia":"MN",
    "Myanmar":"MM","Burma":"MM","Nepal":"NP","Uzbekistan":"UZ",
    "Pakistan":"PK","Philippines":"PH","Singapore":"SG","Sri Lanka":"LK",
    "Tajikistan":"TJ","Taiwan":"TW","Thailand":"TH","East Timor":"TL",
    "Timor-Leste":"TL","Turkmenistan":"TM","Vietnam":"VN"
  };
  try{
    const r=await fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json');
    if(!r.ok)throw new Error();
    const raw=await r.json();
    const codes=new Set(PAYS.map(p=>p.code));
    // Log tous les noms pour debug
    const allNames=raw.features.map(f=>f.properties.name||'').filter(n=>n);
    console.log('GeoJSON names sample:', allNames.slice(0,10));
    raw.features=raw.features.filter(f=>{
      const code=NAME2CODE[f.properties.name||''];
      if(!code&&codes.has('XX'))console.log('no match:',f.properties.name);
      return code&&codes.has(code);
    });
    raw.features.forEach(f=>{
      f.properties.code=NAME2CODE[f.properties.name||'']||'';
    });
    console.log('Matched features:', raw.features.length, '/ expected:', PAYS.length);
    if(raw.features.length===0)throw new Error('no features matched');
    geoData=raw;
    document.getElementById('load-ov').style.display='none';
    jumpToPhase(1);
  }catch(e){
    // Fallback: essayer avec Natural Earth via unpkg
    try{
      const r2=await fetch('https://cdn.jsdelivr.net/gh/nvkelso/natural-earth-vector@master/geojson/ne_110m_admin_0_countries.geojson');
      if(!r2.ok)throw new Error();
      const raw2=await r2.json();
      const codes=new Set(PAYS.map(p=>p.code));
      raw2.features=raw2.features.filter(f=>{
        const iso=(f.properties.ISO_A2||'').toUpperCase();
        return codes.has(iso);
      });
      raw2.features.forEach(f=>{
        f.properties.code=(f.properties.ISO_A2||'').toUpperCase();
      });
      if(raw2.features.length===0)throw new Error();
      geoData=raw2;
      document.getElementById('load-ov').style.display='none';
      jumpToPhase(1);
    }catch(e2){
      document.getElementById('load-ov').innerHTML='<div style="color:#ef4444;text-align:center;padding:32px">Erreur de chargement.<br>Verifiez votre connexion.</div>';
    }
  }
}

// ===== TOUCH =====
function initTouch(){
  const c=map.getContainer();
  c.addEventListener('touchstart',e=>{if(e.touches.length){_touchSX=e.touches[0].clientX;_touchSY=e.touches[0].clientY;}},{passive:true});
  c.addEventListener('touchend',e=>{
    if(!e.changedTouches.length)return;
    const t=e.changedTouches[0];
    if(Math.abs(t.clientX-_touchSX)>10||Math.abs(t.clientY-_touchSY)>10)return;
    const rect=c.getBoundingClientRect();
    const ll=map.containerPointToLatLng([t.clientX-rect.left,t.clientY-rect.top]);
    if(!gLayer||!_geoClickFn)return;
    let hit=false;
    gLayer.eachLayer(l=>{
      if(hit||!l.feature)return;
      try{if(l.getBounds().contains(ll)&&ptInLayer(ll,l)){hit=true;_geoClickFn(l.feature.properties.code);}}catch(e){}
    });
  },{passive:true});
}
function ptInLayer(ll,l){
  const g=l.feature.geometry,pt=[ll.lng,ll.lat];
  const polys=g.type==='MultiPolygon'?g.coordinates:g.type==='Polygon'?[g.coordinates]:[];
  return polys.some(p=>ptInRing(pt,p[0]));
}
function ptInRing(pt,ring){
  let inside=false;
  for(let i=0,j=ring.length-1;i<ring.length;j=i++){
    const xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];
    if(((yi>pt[1])!==(yj>pt[1]))&&pt[0]<(xj-xi)*(pt[1]-yi)/(yj-yi)+xi)inside=!inside;
  }
  return inside;
}

// ===== LAYER =====
function buildLayer(clickFn){
  if(gLayer){gLayer.remove();gLayer=null;}
  _geoClickFn=clickFn;
  gLayer=L.geoJSON(geoData,{
    style:f=>styleFor(f.properties.code),
    onEachFeature:(f,l)=>l.on('click',e=>{L.DomEvent.stop(e);clickFn(f.properties.code);})
  }).addTo(map);
}
function styleFor(code){
  const col=COLORS[code]||'#888';
  const f=found.has(code);
  return{fillColor:col,fillOpacity:f?.7:.5,color:'#1a1a2e',weight:2,opacity:1};
}
function setS(code,s){gLayer&&gLayer.eachLayer(l=>{if(l.feature.properties.code===code)l.setStyle(s);});}
const sOK={fillColor:'#22c55e',fillOpacity:.85,color:'#86efac',weight:3,opacity:1};
const sKO={fillColor:'#ef4444',fillOpacity:.72,color:'#fca5a5',weight:3,opacity:1};

// ===== PHASE =====
function jumpToPhase(p){
  phase=p; used=[]; found=new Set(); errors=new Set(); reviewMode=false; reviewPool=[]; answered=false; clearMarkers();
  [1,2,3].forEach(n=>document.getElementById('ps'+n).classList.remove('active'));
  document.getElementById('ps'+p).classList.add('active');
  updateLangUI();
  if(p===1){
    buildLayer(clickPays);
  } else if(p===2){
    buildLayer(()=>{}); // layer décoratif, clics sur marqueurs
    buildCapMarkers();
  } else {
    buildLayer(()=>{});
    buildFlagMarkers();
  }
  fitEurope();
  document.getElementById('prog').style.width='0%';
  nextQ();
}

function fitEurope(){map.setView([35,90],3);}

// ===== LANGUE =====
function toggleLang(){
  lang=lang==='fr'?'en':'fr';
  document.getElementById('lang-btn').textContent=lang==='fr'?'🇫🇷':'🇬🇧';
  updateLangUI();
  nextQ();
}
function updateLangUI(){
  document.getElementById('hdr-sub').textContent=t(phase===1?'pays':phase===2?'capitales':'drapeaux');
  document.getElementById('lb1').textContent=t('pays');
  document.getElementById('lb2').textContent=t('capitales');
  document.getElementById('lb3').textContent=t('drapeaux');
  document.getElementById('ps1l').textContent=t('pays');
  document.getElementById('ps2l').textContent=t('capitales');
  document.getElementById('ps3l').textContent=t('drapeaux');
}

// ===== QUESTIONS =====
function nextQ(){
  answered=false;
  const total=PAYS.length;
  // Fin du cycle normal : passer en mode révision des erreurs
  if(used.length>=total && reviewMode===false){
    if(errors.size>0){
      reviewMode=true;
      reviewPool=[...errors];
      used=[];
      // Remettre couleurs d'origine pour les pays corrects
      PAYS.filter(p=>!errors.has(p.code)).forEach(p=>{
        if(phase===1) gLayer&&gLayer.eachLayer(l=>{if(l.feature&&l.feature.properties.code===p.code)l.setStyle(styleFor(p.code));});
      });
      if(phase>1){clearMarkers();phase===2?buildCapMarkers():buildFlagMarkers();}
      fb('hint', lang==='fr'? errors.size+' pays a revoir...': errors.size+' countries to review...');
    } else {
      // Parfait, tout reset
      reviewMode=false; reviewPool=[];
      used=[]; found=new Set(); errors=new Set();
      if(phase===1) buildLayer(clickPays);
      else if(phase===2){buildLayer(()=>{});buildCapMarkers();}
      else{buildLayer(()=>{});buildFlagMarkers();}
      fb('hint', lang==='fr'?'Parfait ! Recommencez...':'Perfect! Starting over...');
    }
  }
  // Fin du cycle révision
  if(reviewMode && used.length>=reviewPool.length){
    if(errors.size>0){
      reviewPool=[...errors];
      used=[];
      fb('hint', lang==='fr'? errors.size+' pays a revoir...': errors.size+' countries to review...');
    } else {
      reviewMode=false; reviewPool=[];
      used=[]; found=new Set(); errors=new Set();
      if(phase===1) buildLayer(clickPays);
      else if(phase===2){buildLayer(()=>{});buildCapMarkers();}
      else{buildLayer(()=>{});buildFlagMarkers();}
      fb('hint', lang==='fr'?'Parfait ! Recommencez...':'Perfect! Starting over...');
    }
  }
  const pool = reviewMode
    ? reviewPool.filter(c=>!used.includes(c)).map(c=>PAYS.find(p=>p.code===c)).filter(Boolean)
    : PAYS.filter(p=>!used.includes(p.code));
  if(pool.length===0){used=[];nextQ();return;}
  cur=pool[Math.floor(Math.random()*pool.length)];
  used.push(cur.code);
  document.getElementById('prog').style.width=(used.length/total*100)+'%';

  if(phase===1){
    qt(t('ouPays')+' <span class="q-hl">'+pName(cur)+'</span> ?');
    fb('hint',t('tapPays'));
  } else if(phase===2){
    qt(t('ouCap')+' : <span class="q-hl">'+pCap(cur)+'</span> ?<span class="q-ctx">'+pName(cur)+'</span>');
    fb('hint',t('tapCap'));
    updateCapMarkers();
  } else {
    qt(t('ouFlag')+' <span class="q-hl">'+pName(cur)+'</span> ?');
    fb('hint',t('tapFlag'));
    updateFlagMarkers();
  }
}

// ===== CLICS PAYS =====
function clickPays(code){
  if(answered)return; answered=true;
  if(code===cur.code){
    setS(code,sOK); found.add(code); errors.delete(code);
    fb('ok','✓ '+pName(cur)); scores[1].ok++;
  } else {
    const cl=pInfo(code);
    setS(code,sKO); setS(cur.code,sOK); found.add(cur.code); errors.add(cur.code);
    fb('ko','✗ '+(cl?pName(cl):'?')+' — '+pName(cur)); scores[1].ko++;
  }
  document.getElementById('sc1').textContent=scores[1].ok+'✓ '+scores[1].ko+'✗';
  setTimeout(nextQ,1200);
}

// ===== MARQUEURS CAPITALES =====
function buildCapMarkers(){
  clearMarkers();
  PAYS.forEach(p=>{
    const m=L.marker([p.lat,p.lng],{
      icon:L.divIcon({className:'',html:'<div class="pm idle" id="cm-'+p.code+'">🏛</div>',iconSize:[32,32],iconAnchor:[16,16]}),
      interactive:true,bubblingMouseEvents:false,zIndexOffset:500
    }).addTo(map);
    m.on('click',e=>{L.DomEvent.stop(e);clickCap(p.code);});
    m._code=p.code; markers.push(m);
  });
}
function updateCapMarkers(){
  markers.forEach(m=>{
    const el=document.getElementById('cm-'+m._code);
    if(el)el.className='pm '+(found.has(m._code)?'done':'idle');
  });
}
function clickCap(code){
  if(answered)return; answered=true;
  if(code===cur.code){
    setMarkerCls('cm-'+code,'ok'); found.add(code); errors.delete(code);
    fb('ok','✓ '+pCap(cur)+' — '+pName(cur)); scores[2].ok++;
  } else {
    const cl=pInfo(code);
    setMarkerCls('cm-'+code,'ko'); setMarkerCls('cm-'+cur.code,'ok'); found.add(cur.code); errors.add(cur.code);
    fb('ko','✗ '+(cl?pCap(cl):'?')+' — '+pCap(cur)); scores[2].ko++;
  }
  document.getElementById('sc2').textContent=scores[2].ok+'✓ '+scores[2].ko+'✗';
  setTimeout(nextQ,1200);
}

// ===== MARQUEURS DRAPEAUX =====
function buildFlagMarkers(){
  clearMarkers();
  PAYS.forEach(p=>{
    const m=L.marker([p.lat,p.lng],{
      icon:L.divIcon({className:'',html:'<div class="pm idle" id="fm-'+p.code+'" style="font-size:20px">'+p.flag+'</div>',iconSize:[32,32],iconAnchor:[16,16]}),
      interactive:true,bubblingMouseEvents:false,zIndexOffset:500
    }).addTo(map);
    m.on('click',e=>{L.DomEvent.stop(e);clickFlag(p.code);});
    m._code=p.code; markers.push(m);
  });
}
function updateFlagMarkers(){
  markers.forEach(m=>{
    const el=document.getElementById('fm-'+m._code);
    if(el){
      const isDone=found.has(m._code);
      el.style.opacity=isDone?'0.35':'1';
      el.className='pm '+(isDone?'done':'idle');
    }
  });
}
function clickFlag(code){
  if(answered)return; answered=true;
  if(code===cur.code){
    setMarkerCls('fm-'+code,'ok'); found.add(code); errors.delete(code);
    fb('ok','✓ '+cur.flag+' '+pName(cur)); scores[3].ok++;
  } else {
    const cl=pInfo(code);
    setMarkerCls('fm-'+code,'ko'); setMarkerCls('fm-'+cur.code,'ok'); found.add(cur.code); errors.add(cur.code);
    fb('ko','✗ '+(cl?cl.flag+' '+pName(cl):'?')+' — '+cur.flag+' '+pName(cur)); scores[3].ko++;
  }
  document.getElementById('sc3').textContent=scores[3].ok+'✓ '+scores[3].ko+'✗';
  setTimeout(nextQ,1200);
}

// ===== UTILS =====
function setMarkerCls(id,cls){const el=document.getElementById(id);if(el)el.className='pm '+cls;}
function clearMarkers(){markers.forEach(m=>m.remove());markers=[];}
function fb(cls,txt){const el=document.getElementById('fb-bar');el.className='fb-bar '+cls;el.textContent=txt;}
function qt(html){document.getElementById('q-text').innerHTML=html;}
function raz(){
  scores={1:{ok:0,ko:0},2:{ok:0,ko:0},3:{ok:0,ko:0}};
  errors=new Set(); reviewMode=false; reviewPool=[];
  ['1','2','3'].forEach(n=>document.getElementById('sc'+n).textContent='0✓ 0✗');
  jumpToPhase(phase);
}
